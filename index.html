<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booger to Burger AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Booger to Burger 🍔</h1>
        <p>Upload an image of a... specimen... and our AI chef will transform its essence into a gourmet burger masterpiece.</p>
        
        <div class="upload-container">
            <input type="file" id="imageUpload" accept="image/*" class="hidden">
            <label for="imageUpload" class="upload-btn">Upload Image</label>
        </div>

        <div id="results" class="hidden">
            <div class="result-step">
                <h2>Your Specimen</h2>
                <img id="uploadedImage" src="#" alt="Uploaded Image">
            </div>

            <div class="result-step" id="description-container">
                <h2>AI Analysis</h2>
                <div class="loader" id="desc-loader"></div>
                <p id="boogerDescription"></p>
            </div>

            <div class="result-step" id="prompt-container">
                <h2>Gourmet Burger Concept</h2>
                <div class="loader" id="prompt-loader"></div>
                <p id="burgerPrompt"></p>
            </div>

            <div class="result-step" id="burger-container">
                <h2>Your Burger!</h2>
                <div class="loader" id="burger-loader"></div>
                <img id="burgerImage" src="#" alt="Generated Burger">
            </div>
        </div>
    </main>
    <script src="script.js"></script>

</body>
</html>
